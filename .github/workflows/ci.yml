name: PyTutor CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-tests:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Copy env example
        working-directory: backend
        run: cp .env.example .env

      - name: Run unit tests (no backend needed)
        working-directory: backend
        run: |
          python -m pytest tests/test_misconception.py tests/test_pedagogy.py \
            -v --tb=short --color=yes

      - name: Start backend for integration tests
        working-directory: backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Run integration tests
        working-directory: backend
        run: |
          python -m pytest tests/test_api.py \
            -v --tb=short --color=yes -m integration

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check syntax
        working-directory: backend
        run: |
          python -m pip install ruff
          ruff check app/ --select=E,F --ignore=E501
