name: PyTutor CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt pytest pytest-asyncio -q

      - name: Copy env
        working-directory: backend
        run: cp .env.example .env

      - name: Unit tests
        working-directory: backend
        run: python -m pytest tests/test_misconception.py tests/test_pedagogy.py -v --tb=short

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
